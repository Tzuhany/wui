  <text x="112" y="258" fill="#F8FAFC" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="124" font-weight="800" letter-spacing="-0.05em">Wui</text>

