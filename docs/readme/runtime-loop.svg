<svg width="800" height="160" viewBox="0 0 800 160" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="160" rx="12" fill="#F8FAFC" stroke="#E2E8F0"/>

  <!-- boxes -->
  <rect x="20"  y="50" width="130" height="60" rx="10" fill="#0F172A"/>
  <rect x="175" y="50" width="130" height="60" rx="10" fill="#ECFEFF" stroke="#99F6E4"/>
  <rect x="330" y="50" width="130" height="60" rx="10" fill="#FFF7ED" stroke="#FDBA74"/>
  <rect x="485" y="50" width="130" height="60" rx="10" fill="#EFF6FF" stroke="#93C5FD"/>
  <rect x="640" y="50" width="130" height="60" rx="10" fill="#F0FDF4" stroke="#86EFAC"/>

  <!-- labels -->
  <text x="85"  y="75" text-anchor="middle" fill="#F8FAFC" font-size="14" font-weight="bold" font-family="Arial,sans-serif">1. stream</text>
  <text x="85"  y="95" text-anchor="middle" fill="#94A3B8" font-size="11" font-family="Arial,sans-serif">text + tool calls</text>

  <text x="240" y="75" text-anchor="middle" fill="#134E4A" font-size="14" font-weight="bold" font-family="Arial,sans-serif">2. parse</text>
  <text x="240" y="95" text-anchor="middle" fill="#0F766E" font-size="11" font-family="Arial,sans-serif">build blocks</text>

  <text x="395" y="75" text-anchor="middle" fill="#9A3412" font-size="14" font-weight="bold" font-family="Arial,sans-serif">3. authorize</text>
  <text x="395" y="95" text-anchor="middle" fill="#C2410C" font-size="11" font-family="Arial,sans-serif">allow / deny / HITL</text>

  <text x="550" y="75" text-anchor="middle" fill="#1D4ED8" font-size="14" font-weight="bold" font-family="Arial,sans-serif">4. dispatch</text>
  <text x="550" y="95" text-anchor="middle" fill="#2563EB" font-size="11" font-family="Arial,sans-serif">concurrent tools</text>

  <text x="705" y="75" text-anchor="middle" fill="#166534" font-size="14" font-weight="bold" font-family="Arial,sans-serif">5. continue</text>
  <text x="705" y="95" text-anchor="middle" fill="#15803D" font-size="11" font-family="Arial,sans-serif">append + loop</text>

  <!-- arrows -->
  <line x1="150" y1="80" x2="175" y2="80" stroke="#CBD5E1" stroke-width="2"/>
  <line x1="305" y1="80" x2="330" y2="80" stroke="#CBD5E1" stroke-width="2"/>
  <line x1="460" y1="80" x2="485" y2="80" stroke="#CBD5E1" stroke-width="2"/>
  <line x1="615" y1="80" x2="640" y2="80" stroke="#CBD5E1" stroke-width="2"/>

  <text x="400" y="140" text-anchor="middle" fill="#64748B" font-size="12" font-family="Arial,sans-serif">compression, retries, checkpoints, hooks, and permissions live inside the loop</text>
</svg>
